<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Sizes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="mb-4">
        <h3 class="fw-bold">
            Manage Sizes -
            <span th:text="${brand.name}"></span>
        </h3>
    </div>

    <!-- Add Size Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <form th:action="@{'/admin/brands/' + ${brand.id} + '/sizes'}"
                  method="post"
                  th:object="${newSize}">

                <div class="row g-3 align-items-end">

                    <div class="col-md-3">
                        <label class="form-label">Volume (ml)</label>
                        <input type="number"
                               th:field="*{volume}"
                               class="form-control"
                               placeholder="180"
                               required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Packaging</label>
                        <select th:field="*{packaging}"
                                class="form-select"
                                required>
                            <option value="">Select</option>
                            <option th:each="p : ${packagings}"
                                    th:value="${p}"
                                    th:text="${p}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Price</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{price}"
                               class="form-control"
                               placeholder="₹100"
                               required>
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-success w-100">
                            Add Size
                        </button>
                    </div>

                </div>
            </form>

        </div>
    </div>

    <!-- Size List -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Volume</th>
                    <th>Packaging</th>
                    <th>Price</th>
                    <th width="120">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="size : ${brand.sizes}">
                    <td th:text="${size.volume + ' ml'}"></td>
                    <td th:text="${size.packaging}"></td>
                    <td th:text="'₹' + ${size.price}"></td>
                    <td>
                        <form th:action="@{'/admin/brands/' + ${brand.id}
                                 + '/sizes/' + ${size.id} + '/delete'}"
                              method="post">
                            <button class="btn btn-sm btn-danger"
                                    onclick="return confirm('Delete this size?')">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(brand.sizes)}">
                    <td colspan="4" class="text-center text-muted py-4">
                        No sizes added yet.
                    </td>
                </tr>
                </tbody>
            </table>

            <a th:href="@{/admin/brands}"
               class="btn btn-secondary mt-3">Back to Brands</a>

        </div>
    </div>

</div>
</body>
</html>
